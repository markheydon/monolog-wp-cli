name: PHP CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runtime-compat:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        php-version: ['7.2', '7.3', '7.4', '8.0', '8.1', '8.2', '8.3', '8.4']

    name: Runtime PHP ${{ matrix.php-version }}

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer
          coverage: none
        env:
          COMPOSER_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate composer.json and composer.lock
        run: composer validate --strict

      - name: Install dependencies
        run: composer update --prefer-dist --no-progress --no-interaction --no-dev

      - name: Run runtime smoke test
        run: composer run test:runtime-smoke

  unit-tests:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            php-version: '7.2'
            phpunit-version: '^8.5'
          - os: ubuntu-latest
            php-version: '7.3'
            phpunit-version: '^9.6'
          - os: ubuntu-latest
            php-version: '7.4'
            phpunit-version: '^9.6'
          - os: ubuntu-latest
            php-version: '8.0'
            phpunit-version: '^9.6'
          - os: ubuntu-latest
            php-version: '8.1'
            phpunit-version: '^9.6'
          - os: ubuntu-latest
            php-version: '8.2'
            phpunit-version: '^9.6'
          - os: ubuntu-latest
            php-version: '8.3'
            phpunit-version: '^12.5'
          - os: ubuntu-latest
            php-version: '8.4'
            phpunit-version: '^12.5'

    name: Unit PHP ${{ matrix.php-version }}

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer
          coverage: none
        env:
          COMPOSER_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: composer update --prefer-dist --no-progress --no-interaction --with-all-dependencies phpunit/phpunit:${{ matrix.phpunit-version }}

      - name: Run test suite
        run: vendor/bin/phpunit

  qa-tooling:
    name: Tooling PHP 8.3
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
          coverage: none
        env:
          COMPOSER_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Audit dependencies
        run: composer audit --locked --no-interaction

      - name: Run PHPMD
        run: composer run lint:md

      - name: Run PHPCS
        run: composer run lint:cs
